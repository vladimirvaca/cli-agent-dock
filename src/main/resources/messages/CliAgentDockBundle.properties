settings.doubleEsc.comment=Esc always goes to the agent (e.g. to interrupt it). When enabled, pressing Esc twice within 300 ms sends the first Esc to the agent and moves focus back to the editor. \
  Disable this if your agent uses a fast double Esc itself (pressing the two Escs more slowly reaches the agent either way). Shift+Esc always hides the dock.
