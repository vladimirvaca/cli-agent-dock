# Release workflow, triggered by pushing a version tag (e.g. 'v0.1.0'):
# - Verifies the tag matches the version in gradle.properties.
# - Extracts the release notes for exactly that version from CHANGELOG.md
#   (fails if 'patchChangelog' was not run before tagging).
# - Builds and signs the plugin, publishes it to JetBrains Marketplace,
#   and creates a GitHub Release with the plugin ZIP attached.
#
# Required repository secrets: PUBLISH_TOKEN, CERTIFICATE_CHAIN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD.
# See RELEASING.md for the full release procedure and one-time setup.

name: Release
on:
  push:
    tags: [ 'v*' ]

jobs:

  release:
    name: Publish Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Fail fast if the tag does not match the version in gradle.properties
      - name: Verify tag matches project version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROP_VERSION="$(sed -n 's/^version *= *//p' gradle.properties | tr -d '[:space:]')"
          echo "tag=$TAG_VERSION gradle.properties=$PROP_VERSION"
          if [ "$TAG_VERSION" != "$PROP_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match gradle.properties version $PROP_VERSION"
            exit 1
          fi

      # Extract this version's changelog section. Also guards that 'patchChangelog'
      # was run before tagging: fails if CHANGELOG.md has no section for the version.
      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew getChangelog --project-version="$VERSION" --no-header --no-summary \
            --console=plain --quiet --output-file=build/release_notes.md
          echo "--- release notes ---"
          cat build/release_notes.md

      - name: Build and sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew buildPlugin signPlugin

      # Publish to Marketplace before creating the GitHub Release: a failed publish
      # aborts the release, while a failed 'gh release create' is easy to redo by hand.
      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file build/release_notes.md \
            build/distributions/*.zip
