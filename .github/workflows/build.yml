# CI for pushes to 'main' and pull requests:
# - Build the plugin ZIP ('buildPlugin') and upload it as a workflow artifact.
# - Run tests and static checks ('check'), uploading reports on failure.
# - Run plugin structure verification and IntelliJ Plugin Verifier ('verifyPlugin').
#
# Releases are handled separately by release.yml, triggered by pushing a 'v*' tag.
# See RELEASING.md for the release procedure.

name: Build
on:
  # Trigger the workflow on pushes to only the 'main' branch (this avoids duplicate checks being run e.g., for dependabot pull requests)
  push:
    branches: [ main ]
  # Trigger the workflow on any pull request
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  build:
    name: Build, Test and Verify
    runs-on: ubuntu-latest
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Run checks
        run: ./gradlew check

      - name: Run Plugin Verifier
        run: ./gradlew verifyPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-distribution
          path: build/distributions/*.zip

      - name: Collect test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: build/reports/tests

      - name: Collect Plugin Verifier reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pluginVerifier-report
          path: build/reports/pluginVerifier
